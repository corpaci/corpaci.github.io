---
layout: default
---
<div class="post-layout">
  <aside class="toc-sidebar" id="toc-sidebar" aria-label="Table of contents">
    <nav class="toc-nav"></nav>
  </aside>
  <article class="post">
    <header class="post-header mb-4">
      <h1 class="post-title">{{ page.title }}</h1>
      <div class="post-meta">
        <time class="entry_date">{{ page.date | date: "%B %d, %Y" }}</time>
        {% if page.tags.size > 0 %}
        <span class="post-tags">
          {% for tag in page.tags %}
          <a href="/blog/tags/#{{ tag | slugify }}" class="tag-badge">{{ tag }}</a>
          {% endfor %}
        </span>
        {% endif %}
      </div>
    </header>
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
{% include toc.html %}
{% include sidenotes.html %}
