<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}" data-theme="light">

<head>
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
  {% include head.html %}
</head>

<body>
  <nav class="navbar">
    <div class="container">
      <a class="navbar-brand" href="/">Luiza Corpaci</a>
      <div class="nav-links">
        <a class="nav-link{% if page.url == '/research/' %} active{% endif %}" href="/research/">Research</a>
        <a class="nav-link{% if page.url == '/blog/' or page.layout == 'post' %} active{% endif %}" href="/blog/">Blog</a>
        <a class="nav-link{% if page.url == '/about/' %} active{% endif %}" href="/about/">About</a>
        <a class="nav-link{% if page.url == '/connect/' %} active{% endif %}" href="/connect/">Connect</a>
        <a class="nav-link nav-rss" href="/feed.xml">RSS</a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light/dark mode">◐</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {{ content }}
  </main>

  <footer class="footer mt-5 py-4">
    <div class="container footer-content">
      <p class="footer-ethos">Systems all the way down.</p>
      <p>&copy; {{ site.time | date: '%Y' }} Luiza Corpaci</p>
    </div>
  </footer>

  <script>
    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      var btn = document.querySelector('.theme-toggle');
      if (btn) btn.textContent = next === 'dark' ? '\u25D1' : '\u25D0';
    }
    // Sync button icon to current theme on load
    (function() {
      var t = document.documentElement.getAttribute('data-theme');
      var btn = document.querySelector('.theme-toggle');
      if (btn) btn.textContent = t === 'dark' ? '\u25D1' : '\u25D0';
    })();
  </script>
</body>

</html>
