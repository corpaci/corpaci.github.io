<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}" data-theme="day">

<head>
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved === 'dark')  { saved = 'night'; localStorage.setItem('theme', 'night'); }
      if (saved === 'light') { saved = 'day';   localStorage.setItem('theme', 'day');   }
      var preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'night' : 'day';
      document.documentElement.setAttribute('data-theme', saved || preferred);
    })();
  </script>
  {% include head.html %}
</head>

<body>
  <nav class="navbar">
    <a class="navbar-brand" href="/">Luiza Corpaci</a>
    <div class="nav-links">
      <a class="nav-link{% if page.url == '/research/' %} active{% endif %}" href="/research/">Research</a>
      <a class="nav-link{% if page.url == '/blog/' or page.layout == 'post' %} active{% endif %}" href="/blog/">Blog</a>
      <a class="nav-link{% if page.url == '/about/' %} active{% endif %}" href="/about/">About</a>
      <a class="nav-link{% if page.url == '/connect/' %} active{% endif %}" href="/connect/">Connect</a>
<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light/dark mode">◐</button>
    </div>
  </nav>

  <main class="container py-4">
    {{ content }}
  </main>

  <footer class="footer mt-5 py-4">
    <div class="container footer-content">
      <p class="footer-ethos">Systems all the way down.</p>
      <p>&copy; {{ site.time | date: '%Y' }} Luiza Corpaci</p>
    </div>
  </footer>

  <script>
    var THEMES = ['day', 'night', 'spectrum'];
    var ICONS  = { day: '\u25CB', night: '\u25D1', spectrum: '\u273A' };
    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var idx = THEMES.indexOf(current);
      var next = THEMES[(idx + 1) % THEMES.length];
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      var btn = document.querySelector('.theme-toggle');
      if (btn) btn.textContent = ICONS[next] || ICONS['day'];
    }
    (function() {
      var t = document.documentElement.getAttribute('data-theme');
      var btn = document.querySelector('.theme-toggle');
      if (btn) btn.textContent = ICONS[t] || ICONS['day'];
    })();
  </script>
</body>

</html>
